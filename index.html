<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emers Warehouse Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0e10;
    --bg-2: #16161a;
    --bg-3: #1d1d22;
    --line: #2a2a31;
    --line-2: #36363f;
    --ink: #ececf1;
    --ink-2: #a3a3ad;
    --ink-3: #6c6c76;
    --accent: #f05a22;
    --accent-soft: rgba(240, 90, 34, 0.12);
    --good: #5fb878;
    --warn: #e0b341;
    --bad: #d96363;
    --display: 'Fraunces', 'Times New Roman', serif;
    --body: 'Inter Tight', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--body); font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at top left, rgba(240,90,34,0.06), transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(60,80,120,0.05), transparent 50%);
    pointer-events: none; z-index: 0;
  }
  main { position: relative; z-index: 1; padding: 32px 40px 80px; max-width: 1600px; margin: 0 auto; }
  header { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 20px; border-bottom: 1px solid var(--line); }
  .brand { display: flex; flex-direction: column; gap: 6px; }
  .brand .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; color: var(--accent); text-transform: uppercase; }
  .brand h1 { font-family: var(--display); font-weight: 500; font-size: 34px; line-height: 1; letter-spacing: -0.02em; }
  .brand h1 em { font-style: italic; color: var(--ink-2); font-weight: 500; }
  .meta-pill { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .meta-pill .label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-3); }
  .meta-pill .value { font-family: var(--mono); font-size: 13px; color: var(--ink-2); }
  .meta-pill .value strong { color: var(--ink); font-weight: 600; }

  .tab-bar { display: flex; gap: 0; margin-bottom: 32px; border-bottom: 1px solid var(--line); }
  .tab {
    padding: 14px 28px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-3); cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.2s ease;
    user-select: none;
  }
  .tab:hover { color: var(--ink-2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .badge {
    display: inline-block; font-size: 10px; padding: 2px 6px;
    background: var(--bg-3); color: var(--ink-3); margin-left: 8px; font-weight: 600;
  }
  .tab.active .badge { background: var(--accent-soft); color: var(--accent); }

  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); margin-bottom: 32px; }
  .kpi { background: var(--bg-2); padding: 22px 24px; }
  .kpi .label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; }
  .kpi .value { font-family: var(--display); font-size: 36px; font-weight: 500; line-height: 1; letter-spacing: -0.02em; }
  .kpi .sub { font-family: var(--mono); font-size: 11px; color: var(--ink-2); margin-top: 6px; }
  .kpi.accent .value { color: var(--accent); }

  .breakdowns { display: grid; grid-template-columns: 1.1fr 1fr 1fr; gap: 20px; margin-bottom: 36px; }
  .panel { background: var(--bg-2); border: 1px solid var(--line); padding: 20px 22px; }
  .panel h3 { font-family: var(--display); font-style: italic; font-weight: 500; font-size: 16px; margin-bottom: 14px; }
  .bar-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px; margin-bottom: 9px; font-size: 13px; }
  .bar-row .name { color: var(--ink); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-row .val { font-family: var(--mono); font-size: 12px; color: var(--ink-2); }
  .bar-track { grid-column: 1 / -1; height: 4px; background: var(--bg-3); overflow: hidden; margin-top: -4px; margin-bottom: 6px; }
  .bar-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }

  .filterbar { background: var(--bg-2); border: 1px solid var(--line); padding: 18px 22px; margin-bottom: 22px; display: flex; flex-wrap: wrap; gap: 14px; align-items: end; }
  .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }
  .field.wide { flex: 1.5; }
  .field label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-3); }
  .field input, .field select {
    background: var(--bg); color: var(--ink); border: 1px solid var(--line-2);
    padding: 9px 11px; font-family: var(--body); font-size: 13px; outline: none;
    transition: border-color 0.15s ease;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--ink-3); }
  .reset-btn {
    background: transparent; color: var(--ink-2); border: 1px solid var(--line-2);
    padding: 9px 16px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; cursor: pointer; transition: all 0.15s ease;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
  .section-head h2 { font-family: var(--display); font-style: italic; font-weight: 500; font-size: 20px; }
  .section-head .num { font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.1em; }

  .table-wrap { background: var(--bg-2); border: 1px solid var(--line); overflow: hidden; }
  .table-meta { padding: 14px 22px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); font-size: 12px; color: var(--ink-2); }
  .table-meta .count strong { color: var(--ink); }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-family: var(--mono); font-weight: 600;
    font-size: 10px; letter-spacing: 0.13em; text-transform: uppercase;
    color: var(--ink-3); padding: 12px 16px; border-bottom: 1px solid var(--line);
    background: var(--bg-2); position: sticky; top: 0; z-index: 2; cursor: pointer;
    user-select: none; transition: color 0.15s ease;
  }
  thead th:hover { color: var(--accent); }
  thead th.sort-asc::after { content: ' \u25B2'; color: var(--accent); }
  thead th.sort-desc::after { content: ' \u25BC'; color: var(--accent); }
  thead th.numeric, td.numeric { text-align: right; font-variant-numeric: tabular-nums; }
  tbody td { padding: 11px 16px; border-bottom: 1px solid var(--line); font-size: 13px; vertical-align: middle; }
  tbody tr { transition: background-color 0.1s ease; }
  tbody tr:hover { background: var(--bg-3); }
  td.style { font-family: var(--mono); color: var(--ink); font-weight: 500; }
  td.qty { font-family: var(--mono); font-weight: 600; }
  .brand-tag { display: inline-block; padding: 3px 8px; border: 1px solid var(--line-2); font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; }
  .age-pill { display: inline-block; font-family: var(--mono); font-size: 11px; padding: 2px 7px; border-radius: 2px; font-weight: 500; }
  .age-fresh { background: rgba(95,184,120,0.12); color: var(--good); }
  .age-mid { background: rgba(224,179,65,0.12); color: var(--warn); }
  .age-old { background: rgba(217,99,99,0.14); color: var(--bad); }
  .stale-tag { display: inline-block; font-family: var(--mono); font-size: 10px; padding: 2px 6px; background: rgba(217,99,99,0.12); color: var(--bad); }
  .empty { padding: 60px 20px; text-align: center; color: var(--ink-3); font-style: italic; }

  .drawer-row td { background: var(--bg); padding: 0; border-bottom: 1px solid var(--line); }
  .drawer { padding: 18px 22px; }
  .drawer h4 { font-family: var(--mono); font-size: 11px; letter-spacing: 0.13em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 10px; }
  .drawer-table { width: 100%; font-size: 12px; }
  .drawer-table th { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); text-align: left; padding: 6px 12px; border-bottom: 1px solid var(--line); }
  .drawer-table td { padding: 6px 12px; border-bottom: 1px solid var(--line); }
  .drawer-table tr:last-child td { border-bottom: none; }

  .loading-shade { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.4s ease; }
  .loading-shade.hidden { opacity: 0; pointer-events: none; }
  .loading-shade .word { font-family: var(--display); font-style: italic; font-size: 28px; color: var(--ink-2); }
  .footer { margin-top: 24px; font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.05em; }

  @media (max-width: 1100px) { .kpis { grid-template-columns: repeat(2, 1fr); } .breakdowns { grid-template-columns: 1fr; } }
  @media (max-width: 600px) {
    main { padding: 20px 16px 60px; } .brand h1 { font-size: 26px; }
    .kpis { grid-template-columns: 1fr 1fr; } .kpi .value { font-size: 26px; }
    .table-wrap { overflow-x: auto; } table { min-width: 720px; }
    .tab { padding: 12px 16px; font-size: 11px; }
  }
</style>
</head>
<body>
<div class="loading-shade" id="loader"><div class="word">Counting inventory…</div></div>
<main>
  <header>
    <div class="brand">
      <span class="eyebrow">Emers International</span>
      <h1>Warehouse <em>Inventory</em></h1>
    </div>
    <div class="meta-pill">
      <span class="label">Last updated</span>
      <span class="value" id="meta-info">loading</span>
    </div>
  </header>
  <div class="tab-bar" id="tab-bar">
    <div class="tab active" data-wh="hk">HK #5 Bonded<span class="badge" id="badge-hk"></span></div>
    <div class="tab" data-wh="tw">Taiwan<span class="badge" id="badge-tw"></span></div>
  </div>
  <section class="kpis" id="kpis"></section>
  <div class="breakdowns" id="breakdowns">
    <div class="panel"><h3>By brand</h3><div id="by-brand"></div></div>
    <div class="panel"><h3 id="panel-mid-title">By age</h3><div id="by-aging"></div></div>
    <div class="panel"><h3 id="panel-right-title">Top categories</h3><div id="by-category"></div></div>
  </div>
  <div class="section-head"><h2>SKU inventory</h2><span class="num" id="filter-count"></span></div>
  <div class="filterbar">
    <div class="field wide"><label>Search</label><input type="text" id="search" placeholder="Style code or product name" autocomplete="off" /></div>
    <div class="field"><label>Brand</label><select id="filter-brand"><option value="">All brands</option></select></div>
    <div class="field"><label id="extra-label">Filter</label><select id="filter-extra"><option value="">All</option></select></div>
    <div class="field"><label>Age bucket</label>
      <select id="filter-age"><option value="">All ages</option>
        <option value="0-30">0-30 days</option><option value="31-60">31-60 days</option>
        <option value="61-90">61-90 days</option><option value="91-180">91-180 days</option>
        <option value="181-365">181-365 days</option><option value="365+">365+ days</option>
      </select>
    </div>
    <div class="field"><label>Min quantity</label><input type="number" id="filter-minqty" placeholder="0" min="0" /></div>
    <button class="reset-btn" id="reset-btn">Reset</button>
  </div>
  <div class="table-wrap">
    <div class="table-meta"><span class="count" id="table-count"></span><span>Click any row for detail</span></div>
    <table id="table"><thead><tr id="thead-row"></tr></thead><tbody id="tbody"></tbody></table>
    <div class="empty" id="empty" style="display:none;">No SKUs match the current filters.</div>
  </div>
  <div class="footer">Emers International Corp. &middot; Internal use only</div>
</main>
<script>
const fmt = n => Number(n).toLocaleString('en-US');
const $ = s => document.querySelector(s);
const SB_URL = "https://bvwsxuundzbmjdflynvq.supabase.co";
const SB_ANON = "sb_publishable_QLdOEntpP1Den0YJQs6Xjg_fKIAYVJw";

async function sbGet(table, params="") {
  const r = await fetch(SB_URL+"/rest/v1/"+table+"?"+params, {
    headers: { apikey: SB_ANON, Authorization: "Bearer "+SB_ANON, Accept: "application/json" }
  });
  if (!r.ok) throw new Error(table+": "+r.status);
  return r.json();
}
async function sbGetAll(table, select="*", order="") {
  const P=1000; let all=[], off=0;
  while(true) {
    const p = new URLSearchParams({select,limit:P,offset:off});
    if(order) p.set("order",order);
    const pg = await sbGet(table, p.toString());
    all=all.concat(pg); if(pg.length<P) break; off+=P;
  }
  return all;
}

const state = {
  wh:'hk',
  hk:{rows:[],summary:null,meta:null,loaded:false},
  tw:{rows:[],summary:null,meta:null,loaded:false},
  sortKey:'qty', sortDir:'desc',
  filters:{search:'',brand:'',extra:'',age:'',minqty:0}
};
function cur(){ return state[state.wh]; }

const WH = {
  hk: {
    skuT:'inventory_by_sku', detT:'inventory_detail', sumT:'inventory_summary', metT:'inventory_meta',
    cols:[
      {k:'style_code',l:'Style code',cls:'style'},
      {k:'brand',l:'Brand',fn:v=>'<span class="brand-tag">'+v+'</span>'},
      {k:'category',l:'Category'},
      {k:'country_of_origin',l:'Origin'},
      {k:'qty',l:'Units',num:1,cls:'qty'},
      {k:'cartons',l:'Cartons',num:1},
      {k:'locations',l:'Locs',num:1},
      {k:'oldest_age_days',l:'Oldest',num:1,fn:v=>'<span class="age-pill '+ageC(v)+'">'+v+'d</span>'},
      {k:'latest_inbound',l:'Latest in',num:1,mono:1}
    ],
    extraKey:'country_of_origin', extraLabel:'Country of origin',
    search:['style_code','category','brand'],
    dcols:[
      {k:'inbound_date',l:'Inbound'},{k:'location',l:'Location'},
      {k:'spec',l:'Spec',mono:1},{k:'dc',l:'DC'},
      {k:'lot',l:'Lot',mono:1},{k:'country_of_origin',l:'Origin'},
      {k:'age_days',l:'Age',num:1,fn:v=>'<span class="age-pill '+ageC(v)+'">'+v+'d</span>'},
      {k:'qty',l:'Qty',num:1,bold:1}
    ],
    kpi: s=>[
      {l:'Total units',v:fmt(s.total_units),s:'Bonded WH #5',a:1},
      {l:'Total SKUs',v:fmt(s.total_skus),s:fmt(s.total_cartons)+' cartons'},
      {l:'Locked / on hold',v:fmt(s.total_locked),s:'customs / returns'},
      {l:'Brands',v:s.by_brand.length,s:s.by_brand.slice(0,3).map(b=>b.brand).join(' / ')}
    ],
    bd: s=>({
      brand:s.by_brand.map(b=>({l:b.brand,q:b.qty})),
      mid:{t:'By age',items:s.by_aging.map(b=>({l:b.bucket,q:b.qty,s:b.skus+' SKUs'}))},
      right:{t:'Top categories',items:(s.by_category||[]).slice(0,8).map(c=>({l:c.category,q:c.qty}))}
    })
  },
  tw: {
    skuT:'tw_inventory_by_sku', detT:'tw_inventory_detail', sumT:'tw_inventory_summary', metT:'tw_inventory_meta',
    cols:[
      {k:'style_code',l:'Style code',cls:'style'},
      {k:'brand',l:'Brand',fn:v=>'<span class="brand-tag">'+v+'</span>'},
      {k:'product_name',l:'Product'},
      {k:'qty',l:'Units',num:1,cls:'qty'},
      {k:'size_count',l:'Sizes',num:1},
      {k:'shipped_30d',l:'30d shipped',num:1},
      {k:'oldest_age_days',l:'Oldest',num:1,fn:v=>'<span class="age-pill '+ageC(v)+'">'+v+'d</span>'},
      {k:'latest_inbound',l:'Latest in',num:1,mono:1},
      {k:'stale',l:'Stale',num:1,fn:v=>v>0?'<span class="stale-tag">'+v+'</span>':''}
    ],
    extraKey:'warehouse', extraLabel:'Warehouse',
    search:['style_code','product_name','brand'],
    dcols:[
      {k:'inbound_date',l:'Inbound'},{k:'warehouse',l:'WH'},
      {k:'color',l:'Color'},{k:'size',l:'Size',mono:1},
      {k:'brand_code',l:'Code',mono:1},{k:'notes',l:'Notes'},
      {k:'age_days',l:'Age',num:1,fn:v=>'<span class="age-pill '+ageC(v)+'">'+v+'d</span>'},
      {k:'qty',l:'Qty',num:1,bold:1}
    ],
    kpi: s=>[
      {l:'Total units',v:fmt(s.total_units),s:'Taiwan warehouse',a:1},
      {l:'Total SKUs',v:fmt(s.total_skus),s:fmt(s.total_rows)+' rows'},
      {l:'Stale (>30d)',v:fmt(s.stale_units),s:'no shipment in 30d'},
      {l:'Brands',v:s.by_brand.length,s:s.by_brand.slice(0,3).map(b=>b.brand).join(' / ')}
    ],
    bd: s=>({
      brand:s.by_brand.map(b=>({l:b.brand,q:b.qty})),
      mid:{t:'By age',items:s.by_aging.map(b=>({l:b.bucket,q:b.qty,s:b.skus+' SKUs'}))},
      right:{t:'By warehouse',items:(s.by_warehouse||[]).map(w=>({l:w.warehouse,q:w.qty}))}
    })
  }
};

function ageBucket(d){ d=+d||0; if(d<=30)return'0-30';if(d<=60)return'31-60';if(d<=90)return'61-90';if(d<=180)return'91-180';if(d<=365)return'181-365';return'365+'; }
function ageC(d){ d=+d||0; if(d<=60)return'age-fresh';if(d<=180)return'age-mid';return'age-old'; }

function renderBar(id,items,mx){
  $('#'+id).innerHTML = items.map(it=>`
    <div class="bar-row"><span class="name">${it.l}</span>
    <span class="val">${fmt(it.q)}${it.s?' <span style="color:var(--ink-3)">/ '+it.s+'</span>':''}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${mx>0?(it.q/mx*100):0}%"></div></div></div>`).join('');
}
function renderKPIs(){
  const kpis = WH[state.wh].kpi(cur().summary);
  $('#kpis').innerHTML = kpis.map(k=>`<div class="kpi ${k.a?'accent':''}"><div class="label">${k.l}</div><div class="value">${k.v}</div><div class="sub">${k.s}</div></div>`).join('');
}
function renderSummary(){
  renderKPIs();
  const bd = WH[state.wh].bd(cur().summary);
  renderBar('by-brand',bd.brand,Math.max(...bd.brand.map(b=>b.q)));
  $('#panel-mid-title').textContent=bd.mid.t;
  renderBar('by-aging',bd.mid.items,Math.max(...bd.mid.items.map(b=>b.q)));
  $('#panel-right-title').textContent=bd.right.t;
  const mr = bd.right.items.length?Math.max(...bd.right.items.map(b=>b.q)):0;
  renderBar('by-category',bd.right.items,mr);
}
function applyF(){
  const f=state.filters, c=WH[state.wh], q=f.search.trim().toLowerCase();
  return cur().rows.filter(r=>{
    if(f.brand&&r.brand!==f.brand)return false;
    if(f.extra&&r[c.extraKey]!==f.extra)return false;
    if(f.age&&ageBucket(r.oldest_age_days)!==f.age)return false;
    if(f.minqty&&+r.qty<f.minqty)return false;
    if(q){const b=c.search.map(k=>r[k]||'').join(' ').toLowerCase();if(!b.includes(q))return false;}
    return true;
  });
}
function sortR(rows){
  const k=state.sortKey,d=state.sortDir==='asc'?1:-1;
  const isNum=WH[state.wh].cols.filter(c=>c.num).map(c=>c.k).includes(k);
  return[...rows].sort((a,b)=>{let av=a[k]??'',bv=b[k]??'';if(isNum){av=+av||0;bv=+bv||0;}else{av=String(av).toLowerCase();bv=String(bv).toLowerCase();}return av<bv?-d:av>bv?d:0;});
}
function renderTHead(){
  const cols=WH[state.wh].cols;
  const tr=$('#thead-row');
  tr.innerHTML=cols.map(c=>{
    let cls=c.num?'numeric':'';
    if(state.sortKey===c.k)cls+=' '+(state.sortDir==='asc'?'sort-asc':'sort-desc');
    return`<th data-sort="${c.k}" class="${cls}">${c.l}</th>`;
  }).join('');
  tr.querySelectorAll('th[data-sort]').forEach(th=>{
    th.onclick=()=>{const k=th.dataset.sort;if(state.sortKey===k)state.sortDir=state.sortDir==='asc'?'desc':'asc';else{state.sortKey=k;state.sortDir=WH[state.wh].cols.find(c=>c.k===k)?.num?'desc':'asc';}renderTHead();renderTable();};
  });
}
function renderTable(){
  const cols=WH[state.wh].cols;
  const filtered=applyF(), sorted=sortR(filtered);
  const tot=sorted.reduce((s,r)=>s+(+r.qty||0),0);
  $('#table-count').innerHTML='<strong>'+fmt(sorted.length)+'</strong> SKUs / '+fmt(tot)+' units';
  $('#filter-count').textContent=fmt(sorted.length)+' of '+fmt(cur().rows.length)+' SKUs';
  $('#empty').style.display=sorted.length?'none':'block';
  const show=sorted.slice(0,500), tbody=$('#tbody');
  tbody.innerHTML=show.map(r=>{
    const cells=cols.map(c=>{
      const v=r[c.k]??'';
      const cls=[c.num?'numeric':'',c.cls||''].filter(Boolean).join(' ');
      const st=c.mono?'font-family:var(--mono);font-size:12px;color:var(--ink-2);':'';
      const ct=c.fn?c.fn(v):(c.num?fmt(v):(v||'\u2014'));
      return`<td class="${cls}" style="${st}">${ct}</td>`;
    }).join('');
    return`<tr data-style="${r.style_code}">${cells}</tr>`;
  }).join('');
  if(sorted.length>500) tbody.innerHTML+=`<tr><td colspan="${cols.length}" style="text-align:center;color:var(--ink-3);font-style:italic;padding:14px;">Showing top 500. Refine filters to narrow.</td></tr>`;
  tbody.querySelectorAll('tr[data-style]').forEach(tr=>{tr.onclick=()=>toggleDrawer(tr);});
}
async function toggleDrawer(tr){
  const next=tr.nextElementSibling;
  if(next&&next.classList.contains('drawer-row')){next.remove();return;}
  document.querySelectorAll('.drawer-row').forEach(d=>d.remove());
  const cfg=WH[state.wh], cols=cfg.dcols;
  const dr=document.createElement('tr');dr.className='drawer-row';
  dr.innerHTML=`<td colspan="${cfg.cols.length}"><div class="drawer"><div style="color:var(--ink-3);font-style:italic;">Loading…</div></div></td>`;
  tr.parentNode.insertBefore(dr,tr.nextSibling);
  const style=tr.getAttribute('data-style');
  const rows=await sbGet(cfg.detT,new URLSearchParams({select:"*",style_code:"eq."+style,order:"qty.desc",limit:"1000"}).toString());
  const tot=rows.reduce((s,c)=>s+(+c.qty||0),0);
  dr.querySelector('.drawer').innerHTML=`
    <h4>${style} / ${rows.length} rows / ${fmt(tot)} units</h4>
    <table class="drawer-table"><thead><tr>${cols.map(c=>`<th${c.num?' style="text-align:right"':''}>${c.l}</th>`).join('')}</tr></thead>
    <tbody>${rows.slice(0,100).map(r=>`<tr>${cols.map(c=>{
      const v=r[c.k]??'';
      const st=[c.num?'text-align:right;':'',c.mono?'font-family:var(--mono);font-size:11px;color:var(--ink-2);':'',c.bold?'font-family:var(--mono);font-weight:600;':''].join('');
      return`<td style="${st}">${c.fn?c.fn(v):(c.num?fmt(v):(v||'\u2014'))}</td>`;
    }).join('')}</tr>`).join('')}
    ${rows.length>100?`<tr><td colspan="${cols.length}" style="text-align:center;color:var(--ink-3);font-style:italic;">First 100 of ${rows.length}</td></tr>`:''}
    </tbody></table>`;
}
function populateDDs(){
  const cfg=WH[state.wh], rows=cur().rows;
  const brands=[...new Set(rows.map(r=>r.brand).filter(Boolean))].sort();
  const extras=[...new Set(rows.map(r=>r[cfg.extraKey]).filter(Boolean))].sort();
  $('#filter-brand').innerHTML='<option value="">All brands</option>'+brands.map(b=>`<option value="${b}">${b}</option>`).join('');
  $('#extra-label').textContent=cfg.extraLabel;
  $('#filter-extra').innerHTML='<option value="">All</option>'+extras.map(e=>`<option value="${e}">${e}</option>`).join('');
}
function resetF(){
  state.filters={search:'',brand:'',extra:'',age:'',minqty:0};
  ['search','filter-minqty'].forEach(id=>{const e=$('#'+id);if(e)e.value='';});
  ['filter-brand','filter-extra','filter-age'].forEach(id=>{const e=$('#'+id);if(e)e.value='';});
}
function wireUI(){
  $('#search').oninput=e=>{state.filters.search=e.target.value;renderTable();};
  $('#filter-brand').onchange=e=>{state.filters.brand=e.target.value;renderTable();};
  $('#filter-extra').onchange=e=>{state.filters.extra=e.target.value;renderTable();};
  $('#filter-age').onchange=e=>{state.filters.age=e.target.value;renderTable();};
  $('#filter-minqty').oninput=e=>{state.filters.minqty=+e.target.value||0;renderTable();};
  $('#reset-btn').onclick=()=>{resetF();renderTable();};
}
function switchWH(wh){
  state.wh=wh; state.sortKey='qty'; state.sortDir='desc'; resetF();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.wh===wh));
  if(!cur().loaded){
    $('#kpis').innerHTML='<div class="kpi" style="grid-column:1/-1;text-align:center;color:var(--ink-3);font-style:italic;padding:40px;">Loading…</div>';
    loadWH(wh); return;
  }
  showWH();
}
function showWH(){
  const m=cur().meta;
  $('#meta-info').innerHTML='<strong>'+m.source_file+'</strong><br/>'+m.generated_at;
  renderSummary(); populateDDs(); renderTHead(); renderTable();
}
async function loadWH(wh){
  const cfg=WH[wh];
  try{
    const [skuRows,sumRows,metRows]=await Promise.all([
      sbGetAll(cfg.skuT,"*","qty.desc"),
      sbGet(cfg.sumT,"select=data&id=eq.1"),
      sbGet(cfg.metT,"select=data&id=eq.1")
    ]);
    const numK=cfg.cols.filter(c=>c.num).map(c=>c.k);
    state[wh].rows=skuRows.map(r=>{const o={...r};numK.forEach(k=>{o[k]=+r[k]||0;});return o;});
    state[wh].summary=sumRows[0]?.data;
    state[wh].meta=metRows[0]?.data;
    if(!state[wh].summary||!state[wh].meta) throw new Error('No data for '+wh.toUpperCase()+'. Run the push script first.');
    state[wh].loaded=true;
    $('#badge-'+wh).textContent=fmt(state[wh].summary.total_units);
    if(state.wh===wh) showWH();
  }catch(e){
    if(state.wh===wh) $('#kpis').innerHTML=`<div class="kpi" style="grid-column:1/-1;text-align:center;padding:40px;"><div style="color:var(--bad);font-size:16px;margin-bottom:8px;">Could not load ${wh.toUpperCase()} data</div><div style="color:var(--ink-3);font-size:13px;">${e.message}</div></div>`;
    console.error(e);
  }
}
async function init(){
  try{
    await loadWH('hk');
    document.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>switchWH(t.dataset.wh);});
    wireUI();
    setTimeout(()=>$('#loader').classList.add('hidden'),200);
    loadWH('tw');
  }catch(e){
    $('#loader').innerHTML=`<div style="text-align:center;font-family:var(--mono);color:var(--bad);max-width:500px;padding:30px;"><div style="font-size:18px;margin-bottom:12px;">Could not load data.</div><div style="color:var(--ink-2);font-size:13px;">${e.message}</div></div>`;
  }
}
init();
</script>
</body>
</html>
